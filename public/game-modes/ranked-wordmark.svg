<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" role="img" aria-labelledby="title desc">
  <title id="title">Tiered Picks</title>
  <desc id="desc">Hand-illustrated stacked clubhouse boards for Tiered Picks.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#eadcbe"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f6b4a"/>
      <stop offset="1" stop-color="#123c2f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d6b066"/>
      <stop offset="1" stop-color="#b58a3a"/>
    </linearGradient>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.045"/></feComponentTransfer>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="9" dy="10" stdDeviation="0" flood-color="#0f2f25" flood-opacity="0.28"/>
    </filter>
    <style>
      .display{font-family:Impact,'Arial Black',Arial,sans-serif;font-weight:900;letter-spacing:4px;paint-order:stroke;stroke:#fffaf0;stroke-width:8;stroke-linejoin:round;fill:#123c2f}
      .displayGold{font-family:Impact,'Arial Black',Arial,sans-serif;font-weight:900;letter-spacing:4px;paint-order:stroke;stroke:#fffaf0;stroke-width:8;stroke-linejoin:round;fill:#b58a3a}
      .sub{font-family:'Arial Black',Arial,sans-serif;font-size:19px;font-weight:900;letter-spacing:5px;fill:#123c2f}
      .micro{font-family:'Arial Black',Arial,sans-serif;font-size:13px;font-weight:900;letter-spacing:2px;fill:#123c2f}
      .line{stroke:#d8cab0;stroke-width:2.5;stroke-linecap:square}
      .ink{stroke:#123c2f;stroke-width:5;stroke-linejoin:round;stroke-linecap:round;fill:none}
      .thin{stroke:#123c2f;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;fill:none}
      .goldLine{stroke:#b58a3a;stroke-width:6;stroke-linecap:square}
    </style>
  </defs>
  <rect width="640" height="440" fill="#123c2f"/>
  <path d="M42 46h520l34 34v290H78L42 334z" fill="url(#paper)" stroke="#d8cab0" stroke-width="8" filter="url(#shadow)"/>
  <path d="M42 46h520l34 34v290H78L42 334z" fill="#fbf7ed" filter="url(#paperNoise)" opacity="0.9"/>
  <path d="M42 46h520l34 34v290H78L42 334z" fill="none" stroke="#d8cab0" stroke-width="8"/>
  <g opacity="0.22">
    <path class="line" d="M86 118h468M86 165h468M86 212h468M86 259h468M86 306h468"/>
    <path class="line" d="M162 84v252M258 84v252M354 84v252M450 84v252"/>
  </g>
  
  <g transform="translate(128 54)">
    <path d="M76 0h232l26 26v48H50V26z" fill="#123c2f" stroke="#0f2f25" stroke-width="5"/>
    <path d="M38 72h308l28 27v50H10V99z" fill="#1f6b4a" stroke="#0f2f25" stroke-width="5"/>
    <path d="M0 150h384l30 28v54H-30v-54z" fill="url(#gold)" stroke="#0f2f25" stroke-width="5"/>
    <g fill="#fffaf0" opacity="0.85" font-family="Arial Black,Arial" font-weight="900" font-size="20" letter-spacing="2">
      <text x="80" y="45">TIER 1</text><text x="32" y="120">TIER 2</text><text x="-2" y="205">TIER 3</text>
    </g>
    <g stroke="#fffaf0" stroke-width="4" opacity="0.65">
      <path d="M178 38h92M144 113h150M112 198h184"/>
      <path d="M308 38h18M332 113h18M338 198h18"/>
    </g>
  </g>
  <g transform="translate(444 62) rotate(9)">
    <path d="M24 0l9 18 20 3-15 14 4 20-18-10-18 10 4-20L-5 21l20-3z" fill="#fffaf0" stroke="#123c2f" stroke-width="5"/>
    <path d="M23 76v92" class="ink"/>
    <path d="M23 84c28-14 52-6 68 9-18 15-42 18-68 5z" fill="#b58a3a" stroke="#123c2f" stroke-width="5"/>
  </g>
  <path d="M110 324h420" class="goldLine"/>
  <text x="320" y="318" text-anchor="middle" class="display" font-size="98">TIERED</text>

</svg>