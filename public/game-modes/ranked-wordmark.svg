<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" role="img" aria-labelledby="title desc">
  <title id="title">Ranked</title>
  <desc id="desc">Stylized golf tier wordmark for the Ranked Groups game type.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#eadcbe"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d6b066"/>
      <stop offset="1" stop-color="#b58a3a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="9" dy="10" stdDeviation="0" flood-color="#0f2f25" flood-opacity="0.22"/>
    </filter>
    <style>
      .word{font-family:Impact,Arial Black,Arial,sans-serif;font-size:106px;font-weight:900;letter-spacing:4px;paint-order:stroke;stroke:#fbf7ed;stroke-width:9;stroke-linejoin:round;fill:#123c2f}
      .sub{font-family:Arial Black,Arial,sans-serif;font-size:22px;font-weight:900;letter-spacing:7px;fill:#b58a3a}
      .float{animation:float 3.2s ease-in-out infinite;transform-origin:320px 220px}
      .tier{animation:pulse 2.8s ease-in-out infinite;transform-origin:320px 180px}.tier:nth-child(2){animation-delay:.2s}.tier:nth-child(3){animation-delay:.4s}
      @media (prefers-reduced-motion: reduce){.float,.tier{animation:none}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.78}}
    </style>
  </defs>
  <rect width="640" height="440" fill="#123c2f"/>
  <path d="M44 48h520l32 32v288H76L44 336z" fill="url(#paper)" stroke="#d8cab0" stroke-width="8" filter="url(#shadow)"/>
  <g opacity="0.18" stroke="#d8cab0" stroke-width="3">
    <path d="M91 122h455M91 177h455M91 232h455M91 287h455"/>
    <path d="M186 84v253M320 84v253M454 84v253"/>
  </g>
  <g class="float">
    <g transform="translate(180 72)">
      <rect class="tier" x="76" y="0" width="208" height="38" fill="#123c2f"/>
      <rect class="tier" x="38" y="50" width="284" height="38" fill="#1f6b4a"/>
      <rect class="tier" x="0" y="100" width="360" height="38" fill="#b58a3a"/>
      <path d="M180-14l10 20 22 3-16 16 4 22-20-10-20 10 4-22-16-16 22-3z" fill="url(#gold)" stroke="#123c2f" stroke-width="5"/>
    </g>
    <text x="320" y="276" text-anchor="middle" class="word">RANKED</text>
    <text x="320" y="326" text-anchor="middle" class="sub">TIERED GROUPS</text>
    <path d="M116 346h408" stroke="#b58a3a" stroke-width="7" stroke-linecap="square"/>
  </g>
</svg>
