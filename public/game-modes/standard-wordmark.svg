<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" role="img" aria-labelledby="title desc">
  <title id="title">Open Picks</title>
  <desc id="desc">Stylized golf scorecard wordmark for the Open Picks game type.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#eadcbe"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f6b4a"/>
      <stop offset="1" stop-color="#123c2f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="9" dy="10" stdDeviation="0" flood-color="#0f2f25" flood-opacity="0.22"/>
    </filter>
    <style>
      .word{font-family:Impact,Arial Black,Arial,sans-serif;font-size:76px;font-weight:900;letter-spacing:3px;paint-order:stroke;stroke:#fbf7ed;stroke-width:9;stroke-linejoin:round;fill:#123c2f}
      .sub{font-family:Arial Black,Arial,sans-serif;font-size:22px;font-weight:900;letter-spacing:7px;fill:#b58a3a}
      .line{stroke:#b58a3a;stroke-width:7;stroke-linecap:square}
      .bob{animation:bob 3.4s ease-in-out infinite;transform-origin:320px 220px}
      @media (prefers-reduced-motion: reduce){.bob{animation:none}}
      @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    </style>
  </defs>
  <rect width="640" height="440" fill="#123c2f"/>
  <path d="M44 48h520l32 32v288H76L44 336z" fill="url(#paper)" stroke="#d8cab0" stroke-width="8" filter="url(#shadow)"/>
  <g opacity="0.28" stroke="#d8cab0" stroke-width="3">
    <path d="M91 118h455M91 165h455M91 212h455M91 259h455M91 306h455"/>
    <path d="M165 84v253M252 84v253M339 84v253M426 84v253"/>
  </g>
  <g class="bob">
    <path d="M106 88h428v62H106z" fill="#123c2f"/>
    <path d="M124 340h392" class="line"/>
    <text x="320" y="264" text-anchor="middle" class="word">OPEN PICKS</text>
    <text x="320" y="314" text-anchor="middle" class="sub">FULL FIELD</text>
    <g transform="translate(478 76) rotate(-12)">
      <rect x="0" y="0" width="24" height="104" rx="7" fill="#b58a3a"/>
      <path d="M0 18h24" stroke="#fbf7ed" stroke-width="5"/>
      <path d="M12 104l-12 28h24z" fill="#123c2f"/>
    </g>
    <g transform="translate(102 76)">
      <circle cx="36" cy="36" r="31" fill="#fbf7ed" stroke="#123c2f" stroke-width="7"/>
      <g fill="#d8cab0"><circle cx="25" cy="25" r="4"/><circle cx="41" cy="23" r="4"/><circle cx="50" cy="38" r="4"/><circle cx="31" cy="45" r="4"/></g>
    </g>
  </g>
</svg>
